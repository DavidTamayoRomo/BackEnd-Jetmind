services:
  api:
    build: .
    container_name: backend-jetmind-api
    ports:
      - "3000:3000"
    env_file:
      - .env.example
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:6
    container_name: backend-jetmind-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
